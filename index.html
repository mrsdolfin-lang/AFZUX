<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>AFZUX v4.0</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#07070D;color:#E8E8F8;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px}
#root{min-height:100vh}
input,textarea,button,select{font-family:inherit}
button{cursor:pointer;border:none;outline:none;background:none}
input,select{outline:none;border:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#252535;border-radius:4px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
select option{background:#14141E}
</style>
</head>
<body>
<div id="root"></div>
<script>
window.ST={
  get:function(k,s){return new Promise(function(res,rej){var v=localStorage.getItem((s?'sh_':'lc_')+k);if(v===null)rej(new Error('nf'));else res({value:v})})},
  set:function(k,v,s){return new Promise(function(res){try{localStorage.setItem((s?'sh_':'lc_')+k,typeof v==='string'?v:JSON.stringify(v));res(true)}catch(e){res(null)}})},
  del:function(k,s){return new Promise(function(res){try{localStorage.removeItem((s?'sh_':'lc_')+k);res(true)}catch(e){res(null)}})},
  list:function(p,s){return new Promise(function(res){try{var prefix=(s?'sh_':'lc_')+p;var keys=Object.keys(localStorage).filter(function(k){return k.startsWith(prefix)}).map(function(k){return k.replace(/^(sh_|lc_)/,'')});res({keys:keys})}catch(e){res({keys:[]})}})}
};
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="./afzux-app.js"></script>
</body>
</html>
