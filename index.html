<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>AFZUX v4.0 — FIZUX Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#07070D; --surface:#0F0F18; --card:#14141E; --card2:#1A1A26;
    --border:#252535; --borderLight:#323245;
    --text:#E8E8F8; --sub:#9090B0; --muted:#606080; --dim:#303048;
    --accent:#C9A84C; --accentSoft:rgba(201,168,76,0.12);
    --purple:#7B5FE0; --blue:#3A8FEF; --green:#28BB7A;
    --red:#EF4060; --orange:#EF7C30;
    --gradGold:linear-gradient(135deg,#C9A84C,#E8C96B);
    --shadow:0 4px 24px rgba(0,0,0,0.5);
    --shadowLg:0 8px 48px rgba(0,0,0,0.7);
    --shadowGold:0 4px 20px rgba(201,168,76,0.25);
    --font:'Plus Jakarta Sans',system-ui,sans-serif;
    --mono:'DM Mono',monospace;
    --display:'Syne',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  input,textarea,button,select{font-family:var(--font);}
  button{cursor:pointer;border:none;outline:none;}
  input,textarea,select{outline:none;border:none;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes bounce{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1}}
  .spinner{width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
</style>
</head>
<body>
<div id="root"></div>

<script>
window.storage = {
  async get(key, shared) {
    try { const v=localStorage.getItem((shared?'sh_':'lc_')+key); if(v===null)throw new Error('nf'); return{key,value:v,shared:!!shared}; }catch(e){throw e;}
  },
  async set(key, value, shared) {
    try{localStorage.setItem((shared?'sh_':'lc_')+key,typeof value==='string'?value:JSON.stringify(value));return{key,value,shared:!!shared};}catch(e){return null;}
  },
  async delete(key, shared) {
    try{localStorage.removeItem((shared?'sh_':'lc_')+key);return{key,deleted:true};}catch(e){return null;}
  },
  async list(prefix, shared) {
    try{const p=(shared?'sh_':'lc_')+prefix;const keys=Object.keys(localStorage).filter(k=>k.startsWith(p)).map(k=>k.replace(/^(sh_|lc_)/,''));return{keys};}catch(e){return{keys:[]};}
  }
};
</script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<script type="text/babel" src="./afzux-app.js" data-presets="react"></script>
</body>
</html>
